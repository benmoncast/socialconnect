spring.application.name=socialconnect
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.datasource.url=${DB_URL:jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:${MYSQLUSER}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:3600000}
app.upload.dir=${UPLOAD_DIR:uploads}
app.security.require-https=${REQUIRE_HTTPS:true}
app.auth.cookie.secure=${AUTH_COOKIE_SECURE:${app.security.require-https}}
app.auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
