#spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/socialconnect_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}

spring.datasource.url=${DB_URL:jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}

spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
app.jwt.secret=${JWT_SECRET:local-development-jwt-secret-32-bytes-minimum-only}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.security.require-https=false
app.auth.cookie.secure=false
app.auth.cookie.same-site=Lax
